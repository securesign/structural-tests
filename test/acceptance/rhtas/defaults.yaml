# Shared FBC configuration for all versions. Override per version in fbcOverrides.
fbc:
  olmPackage: "rhtas-operator"
  operatorBundleImage: "registry.redhat.io/rhtas/rhtas-operator-bundle"
  catalogPath: "/configs/rhtas-operator/catalog.json"
  imageKeyPrefix: "fbc-"
  defaultChannel: "stable"
  expectedChannels:
    - stable
    - stable-v1.1
    - stable-v1.2
    - stable-v1.3
    - stable-v1.4
  expectedDeprecations:
    - stable-v1.1
    - rhtas-operator.v1.1.0
    - rhtas-operator.v1.1.1
    - rhtas-operator.v1.1.2

# Optional per-version overrides (key = FBC image key, e.g. fbc-v4-15). Only set fields that differ from fbc.
fbcOverrides:
  fbc-v4-21:
    expectedChannels:
      - stable
      - stable-v1.3
      - stable-v1.4
    expectedDeprecations: []

otherOperatorImageKeys:
  - trillian-netcat-image
  - http-server-image

mandatoryTasOperatorImageKeys:
  - trillian-log-server-image
  - trillian-log-signer-image
  - trillian-db-image
  - createtree-image
  - fulcio-server-image
  - rekor-redis-image
  - rekor-search-ui-image
  - rekor-server-image
  - rekor-monitor-image
  - backfill-redis-image
  - tuf-image
  - ctlog-image
  - client-server-image
  - timestamp-authority-image
  - ctlog-monitor-image

