operator:
  operatorImageKey: "model-validation-operator-image"
  entrypointcmd: "-h"
  parseFormat: "help"
  bundleImageKey: "model-validation-operator-bundle-image"
  bundleCsvPath: "manifests/model-validation-operator.clusterserviceversion.yaml"
  imageKeys:
    - validation-agent-image
  imageKeyMap:
    validation-agent-image: model-validation-agent-image

fbc:
  olmPackage: "model-validation-operator"
  operatorBundleImage: "registry.redhat.io/rhtas/model-validation-operator-bundle"
  catalogPath: "/configs/model-validation-operator/catalog.json"
  imageKeyPrefix: "mvo-fbc-"
  defaultChannel: "tech-preview"
  expectedChannels:
    - tech-preview
